<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Study Planner Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --main:#5c7cfa;
  --bg:#f4f6fb;
  --card:#ffffff;
}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:var(--bg);
}
header{
  background:var(--main);
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}
nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px 0;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
nav button{
  background:none;
  border:none;
  font-size:14px;
}
.active{ color:var(--main); font-weight:bold; }

.section{ display:none; padding:15px; }
.card{
  background:var(--card);
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}
td,th{
  border:1px solid #ddd;
  padding:5px;
  text-align:center;
}
td{ cursor:pointer; }
.completed{ background:#b2f2bb; }
.skip{ background:#dee2e6; }

.progress-bar{
  height:8px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}
.progress{
  height:8px;
  background:var(--main);
}
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.day{
  background:white;
  padding:8px;
  border-radius:10px;
  font-size:12px;
  text-align:center;
}
.mark{ background:#b2f2bb; }

button.main{
  background:var(--main);
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:10px;
  margin:5px 0;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDwusubOIRaETM6p7Bn0FIJXLzOngknoNw",
  authDomain: "study-33c31.firebaseapp.com",
  projectId: "study-33c31",
  storageBucket: "study-33c31.firebasestorage.app",
  messagingSenderId: "219345133274",
  appId: "1:219345133274:web:9288b1301abe88bb4dcfe3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let user;
let data={};
const days=["월","화","수","목","금","토","일"];
const periods=9;

window.login=async()=>{
  const provider=new GoogleAuthProvider();
  await signInWithPopup(auth,provider);
  user=auth.currentUser;
  load();
};

async function load(){
  const snap=await getDoc(doc(db,"users",user.uid));
  data=snap.exists()?snap.data():{};
  document.getElementById("app").style.display="block";
  renderAll();
}

async function save(){
  await setDoc(doc(db,"users",user.uid),data);
  renderAll();
}

function renderAll(){
  renderToday();
  renderSchedule();
  renderStats();
  renderCalendar();
}

function renderToday(){
  const todayIndex=(new Date().getDay()+6)%7;
  const today=days[todayIndex];
  let html="<div class='card'><h3>오늘 ("+today+")</h3>";
  for(let i=1;i<=periods;i++){
    let key=today+"-"+i;
    if(data[key]?.subject){
      html+=`<p onclick="review('${key}')">${i}교시 ${data[key].subject}</p>`;
    }
  }
  html+="</div>";
  document.getElementById("today").innerHTML=html;
}

function renderSchedule(){
  let html="<div class='card'><h3>시간표</h3><table><tr><th></th>";
  days.forEach(d=>html+="<th>"+d+"</th>");
  html+="</tr>";
  for(let i=1;i<=periods;i++){
    html+="<tr><th>"+i+"</th>";
    days.forEach(d=>{
      let key=d+"-"+i;
      let val=data[key]?.subject||"";
      let status=data[key]?.status||"";
      html+=`<td class="${status}" onclick="edit('${key}')">${val}</td>`;
    });
    html+="</tr>";
  }
  html+="</table></div>";
  document.getElementById("schedule").innerHTML=html;
}

window.edit=async(key)=>{
  let subject=prompt("과목 입력",data[key]?.subject||"");
  if(subject===null)return;
  data[key]={subject,status:""};
  await save();
};

window.review=async(key)=>{
  let c=prompt("1 완료 / 2 불필요");
  if(c=="1")data[key].status="completed";
  if(c=="2")data[key].status="skip";
  await save();
};

function renderStats(){
  let total=0,done=0;
  Object.values(data).forEach(v=>{
    if(v?.subject){
      total++;
      if(v.status==="completed")done++;
    }
  });
  let percent=total?Math.round(done/total*100):0;
  document.getElementById("stats").innerHTML=
  `<div class="card">
  <h3>통계</h3>
  <p>${done} / ${total} 완료 (${percent}%)</p>
  <div class="progress-bar">
    <div class="progress" style="width:${percent}%"></div>
  </div>
  </div>`;
}

function renderCalendar(){
  let now=new Date();
  let year=now.getFullYear();
  let month=now.getMonth();
  let first=new Date(year,month,1).getDay();
  let last=new Date(year,month+1,0).getDate();
  let html="<div class='card'><h3>이번 달</h3><div class='calendar'>";
  for(let i=0;i<first;i++)html+="<div></div>";
  for(let d=1;d<=last;d++){
    let key="extra-"+new Date(year,month,d).toDateString();
    let mark=data[key]?"mark":"";
    html+=`<div class="day ${mark}">${d}</div>`;
  }
  html+="</div></div>";
  document.getElementById("calendar").innerHTML=html;
}
</script>
</head>

<body>

<header>📚 Study Planner Ultimate</header>
<button class="main" onclick="login()">구글 로그인</button>

<div id="app" style="display:none;">
<div id="today" class="section" style="display:block;"></div>
<div id="schedule" class="section"></div>
<div id="stats" class="section"></div>
<div id="calendar" class="section"></div>
</div>

</body>
</html>
