<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Planner Ultimate</title>

<!-- Firebase CDN (import 쓰면 안됨) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#f4f6fb}
header{
  background:linear-gradient(90deg,#667eea,#764ba2);
  color:white;padding:18px;text-align:center;font-size:20px;font-weight:bold
}
.container{padding:20px}
button{
  padding:8px 12px;border:none;border-radius:8px;cursor:pointer
}
.login{background:#4285F4;color:white}
.card{
  background:white;padding:15px;border-radius:12px;
  margin-top:15px;box-shadow:0 3px 10px rgba(0,0,0,0.05)
}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{border:1px solid #ddd;padding:6px;text-align:center}
td{cursor:pointer}
.completed{background:#c8f7dc}
.skip{background:#e5e5e5}
.hidden{display:none}
textarea{
  width:100%;margin-top:10px;padding:8px;
  border-radius:8px;border:1px solid #ccc
}
</style>
</head>

<body>

<header>📚 Study Planner Ultimate</header>

<div class="container">
<button id="loginBtn" class="login">구글 로그인</button>

<div id="main" class="hidden">

<div class="card">
<h3 id="todayTitle"></h3>
<div id="todaySchedule"></div>
<textarea id="extraStudy" placeholder="추가로 공부한 내용"></textarea>
<button onclick="saveExtra()">저장</button>
</div>

<div class="card">
<h3>시간표 편집</h3>
<div id="timetable"></div>
</div>

</div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDwusubOIRaETM6p7Bn0FIJXLzOngknoNw",
  authDomain: "study-33c31.firebaseapp.com",
  projectId: "study-33c31",
  storageBucket: "study-33c31.firebasestorage.app",
  messagingSenderId: "219345133274",
  appId: "1:219345133274:web:9288b1301abe88bb4dcfe3"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const days=["월","화","수","목","금","토","일"];
let userId=null;

document.getElementById("loginBtn").onclick=async()=>{
  const provider=new firebase.auth.GoogleAuthProvider();
  const result=await auth.signInWithPopup(provider);
  userId=result.user.uid;
  document.getElementById("main").classList.remove("hidden");
  loadTable();
  showToday();
};

async function loadTable(){
  const doc=await db.collection("users").doc(userId).get();
  const data=doc.exists?doc.data().timetable||{}:{};
  createTable(data);
}

function createTable(data){
  let html="<table><tr><th></th>";
  days.forEach(d=>html+=`<th>${d}</th>`);
  html+="</tr>";
  for(let i=1;i<=9;i++){
    html+=`<tr><th>${i}교시</th>`;
    days.forEach(d=>{
      const key=d+"-"+i;
      html+=`<td onclick="editCell('${key}')">${data[key]||""}</td>`;
    });
    html+="</tr>";
  }
  html+="</table>";
  document.getElementById("timetable").innerHTML=html;
}

async function editCell(key){
  const subject=prompt("과목 입력");
  if(subject!==null){
    const docRef=db.collection("users").doc(userId);
    const doc=await docRef.get();
    const data=doc.exists?doc.data().timetable||{}:{};
    data[key]=subject;
    await docRef.set({timetable:data},{merge:true});
    loadTable();
  }
}

async function showToday(){
  const today=new Date();
  const dayIndex=today.getDay();
  const dayName=days[(dayIndex+6)%7];
  document.getElementById("todayTitle").innerText="오늘 ("+dayName+")";

  const doc=await db.collection("users").doc(userId).get();
  const data=doc.exists?doc.data().timetable||{}:{};

  let html="";
  for(let i=1;i<=9;i++){
    const key=dayName+"-"+i;
    if(data[key]){
      html+=`<div>${i}교시 - ${data[key]}
      <button onclick="mark('${key}','done')">완료</button>
      <button onclick="mark('${key}','skip')">불필요</button>
      </div>`;
    }
  }
  document.getElementById("todaySchedule").innerHTML=html;
}

async function mark(key,type){
  const todayStr=new Date().toISOString().split("T")[0];
  const docRef=db.collection("users").doc(userId);
  await docRef.set({
    review:{
      [todayStr+"-"+key]:type
    }
  },{merge:true});
  alert("저장됨");
}

async function saveExtra(){
  const text=document.getElementById("extraStudy").value;
  const todayStr=new Date().toISOString().split("T")[0];
  await db.collection("users").doc(userId).set({
    extra:{[todayStr]:text}
  },{merge:true});
  alert("저장됨");
}

</script>

</body>
</html>
